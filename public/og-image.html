<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 630px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4A9FD8 0%, #3B82F6 50%, #14B8A6 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 80px;
        }
        .logo {
            font-size: 140px;
            font-weight: 900;
            color: white;
            letter-spacing: -0.05em;
            margin-bottom: 30px;
            text-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .tagline {
            font-size: 48px;
            color: rgba(255,255,255,0.98);
            text-align: center;
            max-width: 1000px;
            line-height: 1.3;
            font-weight: 700;
            text-shadow: 0 4px 16px rgba(0,0,0,0.3);
            margin-bottom: 24px;
        }
        .services {
            font-size: 34px;
            color: rgba(255,255,255,0.92);
            text-align: center;
            max-width: 900px;
            line-height: 1.4;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="logo">OPERVIA</div>
    <div class="tagline">White-Label Technical Partner for Agencies</div>
    <div class="services">Custom Systems • GoHighLevel Integration • Backend Support</div>
</body>
</html>
